<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/indexPage.css}">
    <link rel="stylesheet" th:href="@{/css/tableCss.css}">
</head>
<body>


<!--  Header-->
<div th:replace="~{fragments/header :: header}"></div>
<!--  Header-->


<div class="container mt-5">
    <div class="container mt-5">

        <div class="page-title text-center">
            <h2>📚 Issued Books Management</h2>
            <p class="text-muted mb-1">
                Track issued, returned, lost and damaged books
            </p>
        </div>

        <div class="search-section mt-2">

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

                <form th:action="@{/issues/search}"
                      method="get"
                      class="d-flex">

                    <input type="text"
                           name="keyword"
                           class="form-control me-2"
                           placeholder="Search Student Name">

                    <button type="submit"
                            class="btn btn-secondary">
                        Search
                    </button>

                </form>

                <a th:href="@{/issues/new}"
                   class="btn btn-primary">
                    Issue Book
                </a>

            </div>

        </div>

        <div class="container-fluid px-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mt-2">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Book</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th width="220">Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="issueRecord : ${issueRecords}">

                    <td data-label="ID" th:text="${issueRecord.id}"></td>

                    <td data-label="Student"
                        th:text="${issueRecord.student != null ? issueRecord.student.name : 'N/A'}">
                    </td>

                    <td data-label="Book"
                        th:text="${issueRecord.book != null ? issueRecord.book.title : 'N/A'}">
                    </td>

                    <td data-label="Issue Date"
                        th:text="${issueRecord.issueDate}">
                    </td>

                    <td data-label="Due Date"
                        th:text="${issueRecord.dueDate}">
                    </td>

                    <td data-label="Status">
        <span class="badge bg-primary"
              th:text="${issueRecord.status}">
        </span>
                    </td>

                    <td data-label="Actions">

                        <a th:href="@{/issues/return/{id}(id=${issueRecord.id})}"
                           class="btn btn-success btn-sm me-1 mb-1">
                            Return
                        </a>

                        <a th:href="@{/issues/lost/{id}(id=${issueRecord.id})}"
                           class="btn btn-danger btn-sm me-1 mb-1">
                            Lost
                        </a>

                        <a th:href="@{/issues/damaged/{id}(id=${issueRecord.id})}"
                           class="btn btn-warning btn-sm mb-1">
                            Damaged
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>
</div>



<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->


</body>
</html>
