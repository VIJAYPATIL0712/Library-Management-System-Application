<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div class="hero-section">

    <h1>📚 Library Management System</h1>

    <p>
        Manage Books, Students, Issue & Return Operations Efficiently
    </p>

    <div class="nav-buttons">

        <a th:href="@{/books}">
            <button class="menu-btn books-btn">
                📖 Books
            </button>
        </a>

        <a th:href="@{/students}">
            <button class="menu-btn students-btn">
                🎓 Students
            </button>
        </a>

        <a th:href="@{/issues}">
            <button class="menu-btn issues-btn">
                📤 Issues
            </button>
        </a>

        <a th:href="@{/returns}">
            <button class="menu-btn returns-btn">
                📥 Returns
            </button>
        </a>

    </div>

</div>
<!-- Replace your table section with this -->



<div class="container mt-5">
    <div class="container mt-5">

        <div class="page-title text-center">
            <h2>📚 Issued Books Management</h2>
            <p class="text-muted mb-0">
                Track issued, returned, lost and damaged books
            </p>
        </div>

        <div class="search-section">

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

                <form th:action="@{/issues/search}"
                      method="get"
                      class="d-flex">

                    <input type="text"
                           name="keyword"
                           class="form-control me-2"
                           placeholder="Search Student Name">

                    <button type="submit"
                            class="btn btn-secondary">
                        Search
                    </button>

                </form>

                <a th:href="@{/issues/new}"
                   class="btn btn-primary">
                    Issue Book
                </a>

            </div>

        </div>

        <div class="table-container mt-3">

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle">

                    <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Book</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th width="220">Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="issueRecord : ${issueRecords}">

                    <td th:text="${issueRecord.id}"></td>

                    <td th:text="${issueRecord.student != null ? issueRecord.student.name : 'N/A'}"></td>

                    <td th:text="${issueRecord.book != null ? issueRecord.book.title : 'N/A'}"></td>

                    <td th:text="${issueRecord.issueDate}"></td>

                    <td th:text="${issueRecord.dueDate}"></td>

                    <td>
                    <span class="badge bg-primary"
                          th:text="${issueRecord.status}">
                    </span>
                    </td>

                    <td>

                        <a th:href="@{/issues/return/{id}(id=${issueRecord.id})}"
                           class="btn btn-success btn-sm me-1">
                            Return
                        </a>

                        <a th:href="@{/issues/lost/{id}(id=${issueRecord.id})}"
                           class="btn btn-danger btn-sm me-1">
                            Lost
                        </a>

                        <a th:href="@{/issues/damaged/{id}(id=${issueRecord.id})}"
                           class="btn btn-warning btn-sm">
                            Damaged
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>
</div>
</div>
</body>
</html>
