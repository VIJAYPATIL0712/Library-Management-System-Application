<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/formCss.css}">
</head>
<body>


<div th:replace="~{fragments/formHeader :: formHeader}"></div>


<div class="container ">

    <div class="page-title">

        <div class="book-icon">📚</div>

        <h2>Issue Book</h2>

        <p class="text-muted">
            Enter Details below
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="form-card">



        <form th:action="@{/issues/issue_book}"
              th:object="${issue}"
              method="post">

            <!-- Student -->
            <div class="mb-3">
                <label class="form-label">
                    Select Student
                </label>

                <select th:field="*{studentId}"
                        class="form-select"
                        required>

                    <option value="">
                        -- Select Student --
                    </option>

                    <option th:each="s : ${students}"
                            th:value="${s.id}"
                            th:text="${s.name + ' (LIB' + s.id + ')'}">
                    </option>

                </select>
            </div>

            <!-- Book -->
            <div class="mb-3">
                <label class="form-label">
                    Select Book
                </label>

                <select th:field="*{bookId}"
                        class="form-select"
                        required>

                    <option value="">
                        -- Select Book --
                    </option>

                    <option th:each="b : ${books}"
                            th:value="${b.id}"
                            th:text="${b.title}">
                    </option>

                </select>
            </div>

            <!-- Issue Date -->
<!--            <div class="mb-3">-->
<!--                <label class="form-label">-->
<!--                    Issue Date-->
<!--                </label>-->

<!--                <input type="date"-->
<!--                       th:field="*{issueDate}"-->
<!--                       class="form-control"-->
<!--                       required>-->
<!--            </div>-->

            <!-- Due Date -->
            <div class="mb-4">
                <label class="form-label">
                    Due Date
                </label>

                <input type="date"
                       th:field="*{dueDate}"
                       class="form-control"
                       required>
            </div>

            <div class="text-center">
                <button type="submit"
                        class="btn btn-success">
                    📚 Issue Book
                </button>
            </div>

        </form>

            </div>

        </div>

    </div>

</div>

<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->
</body>
</html>
