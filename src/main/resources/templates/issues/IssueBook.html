<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            font-family: "Lato", sans-serif;
            margin: 0;
        }

        .tablink {
            background-color: #555;
            color: white;
            float: left;
            border: none;
            cursor: pointer;
            padding: 14px 16px;
            font-size: 17px;
            width: 20%;
        }

        .tablink:hover {
            background-color: #777;
        }

        .tabcontent {
            display: none;
            padding: 50px;
            text-align: center;
            color: white;
        }

        #Books { background-color: #2196F3; }
        #Students { background-color: #4CAF50; }
        #Home { background-color: #4CAF56; }
        #Issues { background-color: #FF9800; }
        #Returns { background-color: #9C27B0; }
    </style>
</head>
<body>

<div id="Books" class="tabcontent">
    <h1>Books Management</h1>


    <!--  <a th:href="@{/books}">-->
    <!--    <button>View Books</button>-->
    <!--  </a>-->
</div>

<div id="Students" class="tabcontent">
    <h1>Students Management</h1>


    <!--  <a th:href="@{/students}">-->
    <!--    <button>View Students</button>-->
    <!--  </a>-->
</div>

<div id="Home" class="tabcontent">
    <h1>Welcome To Library Management System</h1>


    <!--  <a th:href="@{/students}">-->
    <!--    <button>View Students</button>-->
    <!--  </a>-->
</div>

<div id="Issues" class="tabcontent">
    <h1>Issue Books</h1>


    <!--  <a th:href="@{/issues}">-->
    <!--    <button>Issue Book</button>-->
    <!--  </a>-->
</div>

<div id="Return" class="tabcontent">
    <h1>Return</h1>


    <!--  <a th:href="@{/returns}">-->
    <!--    <button>Return Book</button>-->
    <!--  </a>-->
</div>
<a th:href="@{/books}">
    <button class="tablink"
            onclick="openTab('Books', this, '#2196F3')"

    >
        Books
    </button>

</a>

<button class="tablink"
        onclick="openTab('Students', this, '#4CAF50')" id="defaultOpen">
    Students
</button>


<a th:href="@{/}">
    <button class="tablink"
            onclick="openTab('Home', this, '#4CAF50')"
    >
        Home
    </button>
</a>

<a th:href="@{/issues}">
    <button class="tablink"
            onclick="openTab('Issues', this, '#FF9800')">
        Issues
    </button>
</a>

<a th:href="@{/returns}">
    <button class="tablink"
            onclick="openTab('Return', this, '#9C27B0')" >
        Return
    </button>
</a>

<script>
    function openTab(tabName, elmnt, color) {

        let i;
        let tabcontent =
            document.getElementsByClassName("tabcontent");

        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }

        let tablinks =
            document.getElementsByClassName("tablink");

        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].style.backgroundColor = "";
        }

        document.getElementById(tabName).style.display = "block";
        elmnt.style.backgroundColor = color;
    }

    document.getElementById("defaultOpen").click();
</script>
<div class="container mt-5">

    <h2 style="text-align:center;">Issue Book</h2>

    <form th:action="@{/issues/issue_book}" th:object="${issue}" method="post">

        <!-- Student -->
        <div class="mb-3">
            <label>Student</label>
            <select th:field="*{student}" class="form-control" required>
                <option value="">-- Select Student --</option>
                <option th:each="s : ${students}"
                        th:value="${s.id}"
                        th:text="${s.name + ' ( LIB' + s.id + ')'}">
                </option>
                </option>
            </select>
        </div>

        <!-- Book -->
        <div class="mb-3">
            <label>Book</label>
            <select th:field="*{book}" class="form-control" required>
                <option value="">-- Select Book --</option>
                <option th:each="b : ${books}"
                        th:value="${b.id}"
                        th:text="${b.title}">
                </option>
            </select>
        </div>

        <!-- Issue Date -->
        <div class="mb-3">
            <label>Issue Date</label>
            <input type="date"
                   th:field="*{issueDate}"
                   class="form-control"
                   required>
        </div>

        <!-- Due Date -->
        <div class="mb-3">
            <label>Due Date</label>
            <input type="date"
                   th:field="*{dueDate}"
                   class="form-control"
                   required>
        </div>

        <button type="submit" class="btn btn-success">
            Issue Book
        </button>

    </form>

</div>
</body>
</html>
