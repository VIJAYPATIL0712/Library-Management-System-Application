<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Library Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>



<div class="hero-section">

  <h1>📚 Library Management System</h1>

  <p>
    Manage Books, Students, Issue & Return Operations Efficiently
  </p>

  <div class="nav-buttons">

    <a th:href="@{/books}">
      <button class="menu-btn books-btn">
        📖 Books
      </button>
    </a>

    <a th:href="@{/students}">
      <button class="menu-btn students-btn">
        🎓 Students
      </button>
    </a>

    <a th:href="@{/issues}">
      <button class="menu-btn issues-btn">
        📤 Issues
      </button>
    </a>

    <a th:href="@{/returns}">
      <button class="menu-btn returns-btn">
        📥 Returns
      </button>
    </a>

  </div>

</div>
<!-- Replace your table section with this -->

<div class="container mt-5">

  <div class="page-title text-center">
    <h2>📖 Returned Books</h2>
    <p class="text-muted mb-0">
      View all returned books and return history
    </p>
  </div>

  <div class="search-section">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

      <form th:action="@{/returns/search}"
            method="get"
            class="d-flex">

        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Search Student Name">

        <button type="submit"
                class="btn btn-secondary">
          Search
        </button>

      </form>

    </div>

  </div>

  <div class="table-container mt-3">

    <div class="table-responsive">

      <table class="table table-hover table-bordered align-middle">

        <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Student</th>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Return Date</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="returnRecord : ${returns}">

        <td th:text="${returnRecord.id}"></td>

        <td th:text="${returnRecord.student != null ? returnRecord.student.name : 'N/A'}"></td>

        <td th:text="${returnRecord.book != null ? returnRecord.book.title : 'N/A'}"></td>

        <td th:text="${returnRecord.issueDate}"></td>

        <td th:text="${returnRecord.dueDate}"></td>

        <td>
                    <span class="badge bg-success"
                          th:text="${returnRecord.status}">
                    </span>
        </td>

        <td th:text="${returnRecord.returnDate}"></td>

      </tr>

      </tbody>

    </table>

    </div>

  </div>

</div>

</body>
</html>
