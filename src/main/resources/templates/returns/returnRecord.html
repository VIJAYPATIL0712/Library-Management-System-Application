</button>
<!--</a>-->
<script>
  function openTab(tabName, elmnt, color) {

      let i;
      let tabcontent =
          document.getElementsByClassName("tabcontent");

      for (i = 0; i < tabcontent.length; i++) {
          tabcontent[i].style.display = "none";
      }

      let tablinks =
          document.getElementsByClassName("tablink");

      for (i = 0; i < tablinks.length; i++) {
          tablinks[i].style.backgroundColor = "";
      }

      document.getElementById(tabName).style.display = "block";
      elmnt.style.backgroundColor = color;
  }

  document.getElementById("defaultOpen").click();
</script>



<div class="container mt-5">

  <h2 class="text-center mb-4">Returned Book</h2>

  <div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">

      <!-- Search Form -->
      <form th:action="@{/returns/search}" method="get" class="d-flex">

        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Search Student Name">

        <button type="submit" class="btn btn-secondary">
          Search
        </button>

      </form>

      <!-- Add Book Button -->
<!--      -->
<!--      <a th:href="@{/issues/new}" class="btn btn-primary">-->
<!--        Issue Book-->
<!--      </a>-->

    </div>

  </div>
  <table class="table table-bordered table-striped">

    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Book</th>
      <th>IssueDate</th>
      <th>DueDate</th>
      <th>Status</th>
      <th>ReturnDate</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="returnRecord : ${returns}">

      <td th:text="${returnRecord.id}"></td>

      <td th:text="${returnRecord.student != null ? returnRecord.student.name : 'N/A'}"></td>

      <td th:text="${returnRecord.book != null ? returnRecord.book.title : 'N/A'}"></td>

      <td th:text="${returnRecord.issueDate}"></td>
      <td th:text="${returnRecord.dueDate}"></td>
      <td th:text="${returnRecord.status}"></td>
      <td th:text="${returnRecord.returnDate}"></td>


    </tr>

    </tbody>

  </table>
