<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Library Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/indexPage.css}">
  <link rel="stylesheet" th:href="@{/css/tableCss.css}">
</head>
<body>


<!--Header-->
<div th:replace="~{fragments/header :: header}"></div>
<!--Header-->

<div class="container mt-5">

  <div class="page-title text-center">
    <h2>📖 Returned Books</h2>
    <p class="text-muted mb-0">
      View all returned books and return history
    </p>
  </div>

  <div class="search-section">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

      <form th:action="@{/returns/search}"
            method="get"
            class="d-flex">

        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Search Student Name">

        <button type="submit"
                class="btn btn-secondary">
          Search
        </button>

      </form>

    </div>

  </div>

  <div class="container-fluid px-2">
    <div class="table-responsive">
      <table class="table table-hover table-bordered align-middle mt-2">

      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Student</th>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Return Date</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="returnRecord : ${returns}">

        <td data-label="ID" th:text="${returnRecord.id}"></td>

        <td data-label="Student"
            th:text="${returnRecord.student != null ? returnRecord.student.name : 'N/A'}">
        </td>

        <td data-label="Book"
            th:text="${returnRecord.book != null ? returnRecord.book.title : 'N/A'}">
        </td>

        <td data-label="Issue Date"
            th:text="${returnRecord.issueDate}">
        </td>

        <td data-label="Due Date"
            th:text="${returnRecord.dueDate}">
        </td>

        <td data-label="Status">
        <span class="badge bg-success"
              th:text="${returnRecord.status}">
        </span>
        </td>

        <td data-label="Return Date"
            th:text="${returnRecord.returnDate}">
        </td>

      </tr>

      </tbody>

    </table>

    </div>

  </div>

</div>

<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->


</body>
</html>
