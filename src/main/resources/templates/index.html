<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Library Management System</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/indexPage.css}">
  <style>

  </style>
</head>

<body>
<!--  Header-->
<div th:replace="~{fragments/header :: header}"></div>
<!--  Header-->

<!--Main Content-->
  <div class="container dashboard">

  <div class="row g-4">

    <!-- Total Books -->
    <div class="col-lg col-md-6">
      <div class="card dashboard-card books">
        <div class="card-body text-center">
          <div class="card-title">Total Books</div>
          <div class="card-number"
               th:text="${totalBooks != null ? totalBooks : 0}">
            0
          </div>
        </div>
      </div>
    </div>

    <!-- Students -->
    <div class="col-lg col-md-6">
      <div class="card dashboard-card students">
        <div class="card-body text-center">
          <div class="card-title">Total Students</div>
          <div class="card-number"
               th:text="${totalStudents != null ? totalStudents : 0}">
            0
          </div>
        </div>
      </div>
    </div>

    <!-- Issued -->
    <div class="col-lg col-md-6">
      <div class="card dashboard-card issued">
        <div class="card-body text-center">
          <div class="card-title">Issued Books</div>
          <div class="card-number"
               th:text="${totalIssuedBooks != null ? totalIssuedBooks : 0}">
            0
          </div>
        </div>
      </div>
    </div>

    <!-- Returned -->
    <div class="col-lg col-md-6">
      <div class="card dashboard-card returned">
        <div class="card-body text-center">
          <div class="card-title">Returned Books</div>
          <div class="card-number"
               th:text="${totalReturnedBooks != null ? totalReturnedBooks : 0}">
            0
          </div>
        </div>
      </div>
    </div>

    <!-- Available -->
    <div class="col-lg col-md-6">
      <div class="card dashboard-card available">
        <div class="card-body text-center">
          <div class="card-title">Available Books</div>
          <div class="card-number"
               th:text="${availableBooks != null ? availableBooks : 0}">
            0
          </div>
        </div>
      </div>
    </div>

  </div>

</div>
<!--Main Content-->


<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->

</body>
</html>
