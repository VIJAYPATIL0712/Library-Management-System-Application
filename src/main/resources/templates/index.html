<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Library Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

    .tablink {
        background-color: #555;
        color: white;
        float: left;
        border: none;
        cursor: pointer;
        padding: 14px 16px;
        font-size: 17px;
        width: 20%;
    }

    .tablink:hover {
        background-color: #777;
    }

    .tabcontent {
        display: none;
        padding: 50px;
        text-align: center;
        color: white;
    }

    #Books { background-color: #2196F3; }
    #Students { background-color: #4CAF50; }
    #Home { background-color: #4CAF56; }
    #Issues { background-color: #FF9800; }
    #Returns { background-color: #9C27B0; }

    .card {
    border-radius: 15px;
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card h2 {
    font-size: 2rem;
}
    body {
        font-family: "Lato", sans-serif;
        margin: 0;
    }

  </style>
</head>
<body>

<div id="Books" class="tabcontent">
  <h1>Books Management</h1>


<!--  <a th:href="@{/books}">-->
<!--    <button>View Books</button>-->
<!--  </a>-->
</div>

<div id="Students" class="tabcontent">
  <h1>Students Management</h1>


<!--  <a th:href="@{/students}">-->
<!--    <button>View Students</button>-->
<!--  </a>-->
</div>

<div id="Home" class="tabcontent">
  <h1>Welcome To Library Management System</h1>


<!--  <a th:href="@{/students}">-->
<!--    <button>View Students</button>-->
<!--  </a>-->
</div>

<div id="Issues" class="tabcontent">
  <h1>Issue Books</h1>


<!--  <a th:href="@{/issues}">-->
<!--    <button>Issue Book</button>-->
<!--  </a>-->
</div>

<div id="Return" class="tabcontent">
  <h1>Return</h1>


<!--  <a th:href="@{/returns}">-->
<!--    <button>Return Book</button>-->
<!--  </a>-->
</div>
<a th:href="@{/books}">
<button class="tablink"
        onclick="openTab('Books', this, '#2196F3')"
        >
  Books
</button>
</a>

<a th:href="@{/students}">
<button class="tablink"
        onclick="openTab('Students', this, '#4CAF50')">
  Students
</button>
</a>

<!--<a th:href="@{/}">-->
<button class="tablink"
        onclick="openTab('Home', this, '#4CAF50')"
        id="defaultOpen">
  Home
</button>
<!--</a>-->

<a th:href="@{/issues}">
<button class="tablink"
        onclick="openTab('Issues', this, '#FF9800')">
  Issues
</button>
</a>

<a th:href="@{/returns}">
  <button class="tablink"
          onclick="openTab('Return', this, '#9C27B0')" >
    Return
  </button>
</a>

<div class="row g-4 mb-4">

  <!-- Total Books -->
  <div class="col-md-4 col-lg">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body">
        <h6 class="text-muted">Total Books</h6>
        <h2 class="fw-bold" th:text="${totalBooks != null ? totalBooks : 0}">0</h2>
      </div>
    </div>
  </div>

  <!-- Total Students -->
  <div class="col-md-4 col-lg">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body">
        <h6 class="text-muted">Total Students</h6>
        <h2 class="fw-bold" th:text="${totalStudents != null ? totalStudents : 0}">0</h2>
      </div>
    </div>
  </div>

  <!-- Issued Books -->
  <div class="col-md-4 col-lg">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body">
        <h6 class="text-muted">Issued Books</h6>
        <h2 class="fw-bold" th:text="${totalIssuedBooks != null ? totalIssuedBooks : 0}">0</h2>
      </div>
    </div>
  </div>

  <!-- Returned Books -->
  <div class="col-md-4 col-lg">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body">
        <h6 class="text-muted">Returned Books</h6>
        <h2 class="fw-bold"
            th:text="${totalReturnedBooks != null ? totalReturnedBooks : 0}">
          0
        </h2>
      </div>
    </div>
  </div>

  <!-- Available Books -->
  <div class="col-md-4 col-lg">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body">
        <h6 class="text-muted">Available Books</h6>
        <h2 class="fw-bold" th:text="${availableBooks != null ? availableBooks : 0}">0</h2>
      </div>
    </div>
  </div>

</div>


<script>
  function openTab(tabName, elmnt, color) {

      let i;
      let tabcontent =
          document.getElementsByClassName("tabcontent");

      for (i = 0; i < tabcontent.length; i++) {
          tabcontent[i].style.display = "none";
      }

      let tablinks =
          document.getElementsByClassName("tablink");

      for (i = 0; i < tablinks.length; i++) {
          tablinks[i].style.backgroundColor = "";
      }

      document.getElementById(tabName).style.display = "block";
      elmnt.style.backgroundColor = color;
  }

  document.getElementById("defaultOpen").click();
</script>
</body>
</html>
