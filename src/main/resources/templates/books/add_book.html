<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book | Library Management System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            font-family:'Segoe UI',sans-serif;
        }

        .navbar-custom{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            padding:15px;
            box-shadow:0 2px 15px rgba(0,0,0,.15);
        }

        .navbar-custom a{
            color:white;
            text-decoration:none;
            font-weight:600;
            margin-right:15px;
        }

        .navbar-custom a:hover{
            opacity:.8;
        }

        .page-title{
            text-align:center;
            margin:40px 0 20px;
        }

        .page-title h2{
            font-weight:700;
            color:#1e293b;
        }

        .form-card{
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 5px 25px rgba(0,0,0,.08);
        }

        .form-label{
            font-weight:600;
            color:#475569;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#2563eb;
        }

        .save-btn{
            width:100%;
            padding:12px;
            font-size:18px;
            font-weight:600;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#16a34a,#22c55e);
            color:white;
        }

        .save-btn:hover{
            opacity:.9;
        }

        .book-icon{
            font-size:60px;
            text-align:center;
            margin-bottom:15px;
        }

        .footer{
            text-align:center;
            margin-top:40px;
            padding:20px;
            color:#64748b;
        }

    </style>
</head>
<body>

<!-- Navigation -->

<div class="navbar-custom text-center">

    <a th:href="@{/}">🏠 Dashboard</a>

    <a th:href="@{/books}">📚 Books</a>

    <a th:href="@{/students}">🎓 Students</a>

    <a th:href="@{/issues}">📤 Issues</a>

    <a th:href="@{/return}">📥 Return</a>

</div>

<div class="container">

    <div class="page-title">

        <div class="book-icon">📚</div>

        <h2>Add New Book</h2>

        <p class="text-muted">
            Enter book information below
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="form-card">

                <form th:action="@{/books/save_books}"
                      th:object="${book}"
                      method="post">

                    <div class="mb-3">

                        <label class="form-label">
                            Book Title
                        </label>

                        <input type="text"
                               th:field="*{title}"
                               class="form-control"
                               placeholder="Enter Book Title">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Author Name
                        </label>

                        <input type="text"
                               th:field="*{author}"
                               class="form-control"
                               placeholder="Enter Author Name">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            ISBN Number
                        </label>

                        <input type="text"
                               th:field="*{isbn}"
                               class="form-control"
                               placeholder="Enter ISBN">

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input type="number"
                                   th:field="*{price}"
                                   class="form-control"
                                   placeholder="Book Price">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input type="number"
                                   th:field="*{quantity}"
                                   class="form-control"
                                   placeholder="Available Quantity">

                        </div>

                    </div>

                    <button type="submit"
                            class="save-btn">

                        Save Book

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<div class="footer">
    Library Management System | Spring Boot + Thymeleaf
</div>

</body>
</html>
