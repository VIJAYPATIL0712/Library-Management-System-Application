<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book | Library Management System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/formCss.css}">
</head>
<body>

<!-- Navigation -->
<div th:replace="~{fragments/formHeader :: formHeader}"></div>

<div class="container">

    <div class="page-title">

        <div class="book-icon">📚</div>

        <h2>Add New Book</h2>

        <p class="text-muted">
            Enter book information below
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="form-card">

                <form th:action="@{/books/save_books}"
                      th:object="${book}"
                      method="post">

                    <div class="mb-3">

                        <label class="form-label">
                            Book Title
                        </label>

                        <input type="text"
                               th:field="*{title}"
                               class="form-control"
                               placeholder="Enter Book Title">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Author Name
                        </label>

                        <input type="text"
                               th:field="*{author}"
                               class="form-control"
                               placeholder="Enter Author Name">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            ISBN Number
                        </label>

                        <input type="text"
                               th:field="*{isbn}"
                               class="form-control"
                               placeholder="Enter ISBN">

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input type="number"
                                   th:field="*{price}"
                                   class="form-control"
                                   placeholder="Book Price">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input type="number"
                                   th:field="*{quantity}"
                                   class="form-control"
                                   placeholder="Available Quantity">

                        </div>

                    </div>

                    <button type="submit"
                            class="save-btn">

                        Save Book

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->

</body>
</html>
