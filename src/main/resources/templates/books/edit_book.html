<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book | Library Management System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            font-family: 'Segoe UI',sans-serif;
        }

        .navbar-custom{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding:15px;
        }

        .navbar-custom a{
            color:white;
            text-decoration:none;
            font-weight:600;
            margin-right:20px;
        }

        .navbar-custom a:hover{
            color:#ffd43b;
        }

        .form-card{
            background:white;
            border-radius:20px;
            padding:35px;
            margin-top:50px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .page-title{
            text-align:center;
            font-weight:bold;
            margin-bottom:25px;
            color:#4b4b4b;
        }

        .form-label{
            font-weight:600;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-update{
            background:#28a745;
            border:none;
            padding:12px;
            width:100%;
            border-radius:10px;
            font-weight:bold;
            color:white;
        }

        .btn-update:hover{
            background:#218838;
        }

        .btn-back{
            width:100%;
            margin-top:10px;
            border-radius:10px;
        }

        @media(max-width:768px){

            .navbar-custom{
                text-align:center;
            }

            .navbar-custom a{
                display:block;
                margin:10px 0;
            }

            .form-card{
                margin:20px;
                padding:25px;
            }
        }

    </style>
</head>

<body>

<nav class="navbar-custom text-center">
    <a th:href="@{/}">🏠 Home</a>
    <a th:href="@{/books}">📚 Books</a>
    <a th:href="@{/students}">👨‍🎓 Students</a>
    <a th:href="@{/issues}">📖 Issues</a>
    <a th:href="@{/returns}">🔄 Returns</a>
</nav>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="form-card">

                <h2 class="page-title">
                    ✏️ Edit Book
                </h2>

                <form th:action="@{/books/save_edit/{id}(id=${book.id})}"
                      th:object="${book}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label">Book Title</label>
                        <input type="text"
                               th:field="*{title}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Author</label>
                        <input type="text"
                               th:field="*{author}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ISBN</label>
                        <input type="text"
                               th:field="*{isbn}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{price}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number"
                               th:field="*{quantity}"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit" class="btn btn-update">
                        💾 Update Book
                    </button>

                    <a th:href="@{/books}"
                       class="btn btn-secondary btn-back">
                        ← Back to Books
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
