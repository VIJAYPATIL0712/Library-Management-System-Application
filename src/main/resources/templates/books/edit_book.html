<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book | Library Management System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/formCss.css}">
</head>

<body>

<div th:replace="~{fragments/formHeader :: formHeader}"></div>

<div class="container">

    <div class="row justify-content-center">


        <div class="page-title">

            <div class="book-icon">📚</div>

            <h2>Edit Book</h2>

            <p class="text-muted">
                Enter book information below
            </p>

        </div>

        <div class="col-lg-7 col-md-9">

            <div class="form-card">


                <form th:action="@{/books/save_edit/{id}(id=${book.id})}"
                      th:object="${book}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label">Book Title</label>
                        <input type="text"
                               th:field="*{title}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Author</label>
                        <input type="text"
                               th:field="*{author}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ISBN</label>
                        <input type="text"
                               th:field="*{isbn}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{price}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number"
                               th:field="*{quantity}"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit" class="btn btn-update">
                        💾 Update Book
                    </button>

                    <a th:href="@{/books}"
                       class="btn btn-secondary btn-back">
                        ← Back to Books
                    </a>

                </form>

            </div>

        </div>

    </div>


</div>

<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->
</body>
</html>
