<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>


<div class="hero-section">

    <h1>📚 Library Management System</h1>

    <p>
        Manage Books, Students, Issue & Return Operations Efficiently
    </p>

    <div class="nav-buttons">

        <a th:href="@{/books}">
            <button class="menu-btn books-btn">
                📖 Books
            </button>
        </a>

        <a th:href="@{/students}">
            <button class="menu-btn students-btn">
                🎓 Students
            </button>
        </a>

        <a th:href="@{/issues}">
            <button class="menu-btn issues-btn">
                📤 Issues
            </button>
        </a>

        <a th:href="@{/returns}">
            <button class="menu-btn returns-btn">
                📥 Returns
            </button>
        </a>

    </div>

</div>
<!-- Replace your table section with this -->

<div class="container mt-5">

    <div class="page-title text-center">
        <h2>📚 Books Management</h2>
        <p class="text-muted mb-0">
            Manage library books efficiently
        </p>
    </div>

    <div class="search-section">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <!-- Search Form -->
            <form th:action="@{/books/search}"
                  method="get"
                  class="d-flex"
                >

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Search Book Title">

                <button type="submit" class="btn btn-secondary">
                    Search
                </button>

            </form>

            <!-- Add Book Button -->
            <a th:href="@{/books/new}"
               class="btn btn-primary">
                + Add Book
            </a>

        </div>

    </div>

    <div class="table-container mt-3">

        <div class="table-responsive">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Book Name</th>
                    <th>Author</th>
                    <th>ISBN</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="7"
                        class="text-center text-muted py-4">
                        No books available
                    </td>
                </tr>

                <tr th:each="book : ${books}">

                    <td th:text="${book.id}"></td>

                    <td class="fw-semibold"
                        th:text="${book.title}">
                    </td>

                    <td th:text="${book.author}"></td>

                    <td th:text="${book.isbn}"></td>

                    <td th:text="'₹' + ${book.price}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${book.quantity}">
                        </span>

                    </td>

                    <td>

                        <a th:href="@{/books/edit/{id}(id=${book.id})}"
                           class="btn btn-warning btn-sm me-1">
                            Edit
                        </a>

                        <a th:href="@{/books/delete/{id}(id=${book.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this book?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>



</body>
</html>
