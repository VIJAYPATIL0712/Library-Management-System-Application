<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/indexPage.css}">
    <link rel="stylesheet" th:href="@{/css/tableCss.css}">

</head>
<body>



<!--  Header-->
<div th:replace="~{fragments/header :: header}"></div>
<!--  Header-->

<div class="container mt-5">

    <div class="page-title text-center">
        <h2>📚 Books Management</h2>
        <p class="text-muted mb-1">
            Manage library books efficiently
        </p>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show"
         role="alert">

        <span th:text="${errorMessage}"></span>

    </div>
    <div class="search-section mt-2">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <!-- Search Form -->
            <form th:action="@{/books/search}"
                  method="get"
                  class="d-flex"
                >

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Search Book Title">

                <button type="submit" class="btn btn-secondary">
                    Search
                </button>

            </form>

            <!-- Add Book Button -->
            <a th:href="@{/books/new}"
               class="btn btn-primary">
                + Add Book
            </a>

        </div>

    </div>

    <div class="container-fluid px-2">
        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle mt-2">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Book Name</th>
                    <th>Author</th>
                    <th>ISBN</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="7"
                        class="text-center text-muted py-4">
                        No books available
                    </td>
                </tr>

                <tr th:each="book : ${books}">

                    <!--                    <td th:text="${book.id}"></td>-->

                    <!--                    <td class="fw-semibold"-->
                    <!--                        th:text="${book.title}">-->
                    <!--                    </td>-->

                    <!--                    <td th:text="${book.author}"></td>-->

                    <!--                    <td th:text="${book.isbn}"></td>-->

                    <!--                    <td th:text="'₹' + ${book.price}"></td>-->

                    <!--                    <td>-->

                    <!--                        <span class="badge bg-success"-->
                    <!--                              th:text="${book.quantity}">-->
                    <!--                        </span>-->

                    <!--                    </td>-->
                    <td data-label="ID" th:text="${book.id}"></td>
                    <td data-label="Book Name" th:text="${book.title}"></td>
                    <td data-label="Author" th:text="${book.author}"></td>
                    <td data-label="ISBN" th:text="${book.isbn}"></td>
                    <td data-label="Price" th:text="'₹' + ${book.price}"></td>
                    <td data-label="Quantity">
                        <span class="badge bg-success" th:text="${book.quantity}"></span>
                    </td>

                    <td>

                        <a th:href="@{/books/edit/{id}(id=${book.id})}"
                           class="btn btn-warning btn-sm me-1">
                            Edit
                        </a>

                        <a th:href="@{/books/delete/{id}(id=${book.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this book?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>
        </div>
    </div>



</div>

<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->

</body>
</html>
