<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student | Library Management System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
        }

        .navbar-custom{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:15px;
            text-align:center;
        }

        .navbar-custom a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-weight:600;
        }

        .navbar-custom a:hover{
            color:#ffd43b;
        }

        .form-card{
            background:white;
            border-radius:20px;
            padding:35px;
            margin-top:50px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .page-title{
            text-align:center;
            font-weight:bold;
            margin-bottom:25px;
            color:#444;
        }

        .form-label{
            font-weight:600;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-save{
            background:#28a745;
            border:none;
            width:100%;
            padding:12px;
            border-radius:10px;
            font-weight:bold;
            color:white;
        }

        .btn-save:hover{
            background:#218838;
        }

        .btn-back{
            width:100%;
            margin-top:10px;
            border-radius:10px;
        }

        @media(max-width:768px){

            .navbar-custom a{
                display:block;
                margin:10px 0;
            }

            .form-card{
                margin:20px;
                padding:25px;
            }
        }

    </style>
</head>

<body>

<nav class="navbar-custom">
    <a th:href="@{/}">🏠 Home</a>
    <a th:href="@{/books}">📚 Books</a>
    <a th:href="@{/students}">👨‍🎓 Students</a>
    <a th:href="@{/issues}">📖 Issues</a>
    <a th:href="@{/returns}">🔄 Returns</a>
</nav>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="form-card">

                <h2 class="page-title">
                    👨‍🎓 Add Student
                </h2>

                <form th:action="@{/students/save_student}"
                      th:object="${student}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="number"
                               th:field="*{contact}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course</label>
                        <input type="text"
                               th:field="*{course}"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit" class="btn btn-save">
                        💾 Save Student
                    </button>

                    <a th:href="@{/students}"
                       class="btn btn-secondary btn-back">
                        ← Back to Students
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
