<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>

<body>

<div class="hero-section">

    <h1>📚 Library Management System</h1>

    <p>
        Manage Books, Students, Issue & Return Operations Efficiently
    </p>

    <div class="nav-buttons">

        <a th:href="@{/books}">
            <button class="menu-btn books-btn">
                📖 Books
            </button>
        </a>

        <a th:href="@{/students}">
            <button class="menu-btn students-btn">
                🎓 Students
            </button>
        </a>

        <a th:href="@{/issues}">
            <button class="menu-btn issues-btn">
                📤 Issues
            </button>
        </a>

        <a th:href="@{/returns}">
            <button class="menu-btn returns-btn">
                📥 Returns
            </button>
        </a>

    </div>

</div>

<div class="container mt-5">

    <div class="page-title text-center">
        <h2>📚 Students Management</h2>
        <p class="text-muted mb-0">
            Manage Students efficiently
        </p>
    </div>

    <div class="search-section">


        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <form th:action="@{/students/search}"
                  method="get"
                  class="d-flex">

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Search Student Name">

                <button type="submit"
                        class="btn btn-secondary">
                    Search
                </button>

            </form>

            <a th:href="@{/students/new}"
               class="btn btn-primary">
                Add Student
            </a>

        </div>

    </div>


    <div class="table-container mt-3">

        <div class="table-responsive">

            <table class="table table-hover table-bordered align-middle">
                <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Contact</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="student : ${students}">

                <td th:text="${student.id}"></td>

                <td th:text="${student.name}"></td>

                <td th:text="${student.email}"></td>

                <td th:text="${student.course}"></td>

                <td th:text="${student.contact}"></td>

                <td>

                    <a th:href="@{/students/edit/{id}(id=${student.id})}"
                       class="btn btn-warning btn-sm me-1">
                        Edit
                    </a>

                    <a th:href="@{/students/delete/{id}(id=${student.id})}"
                       class="btn btn-danger btn-sm"  onclick="return confirm('Are you sure you want to delete this Students?')">
                        Delete
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>
</div>
</body>
</html>
