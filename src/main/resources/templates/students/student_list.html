<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>

          rel="stylesheet">
    <style>
        body {
            font-family: "Lato", sans-serif;
            margin: 0;
        }

        .tablink {
            background-color: #555;
            color: white;
            float: left;
            border: none;
            cursor: pointer;
            padding: 14px 16px;
            font-size: 17px;
            width: 20%;
        }

        .tablink:hover {
            background-color: #777;
        }

        .tabcontent {
            display: none;
            padding: 50px;
            text-align: center;
            color: white;
        }

        #Books { background-color: #2196F3; }
        #Students { background-color: #4CAF50; }
        #Home { background-color: #4CAF56; }
        #Issues { background-color: #FF9800; }
        #Returns { background-color: #9C27B0; }
    </style>
</head>
<body>

<a th:href="@{/books}">
    <button class="tablink"
            onclick="openTab('Books', this, '#2196F3')"
    >
        Books
    </button>
</a>

<!--<a th:href="@{/students}">-->
    <button class="tablink"
            onclick="openTab('Students', this, '#4CAF50')" id="defaultOpen">
        Students
    </button>
<!--</a>-->

<a th:href="@{/}">
    <button class="tablink"
            onclick="openTab('Home', this, '#4CAF50')"
            >
        Home
    </button>
</a>

<a th:href="@{/returns}">
    <button class="tablink"
            onclick="openTab('Return', this, '#9C27B0')" >
        Return
    </button>
</a>
<script>
    function openTab(tabName, elmnt, color) {

        let i;
        let tabcontent =
            document.getElementsByClassName("tabcontent");

        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }

        let tablinks =
            document.getElementsByClassName("tablink");

        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].style.backgroundColor = "";
        }

        document.getElementById(tabName).style.display = "block";
        elmnt.style.backgroundColor = color;
    }

    document.getElementById("defaultOpen").click();
</script>

<div class="container mt-5">
    <h2 class="text-center mb-4">Students List</h2>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <!-- Search Form -->
            <form th:action="@{/students/search}" method="get" class="d-flex">

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Search Student Name">

                <button type="submit" class="btn btn-secondary">
                    Search
                </button>

            </form>

            <!-- Add Book Button -->
            <a th:href="@{/students/new}" class="btn btn-primary">
                Add Student
            </a>

        </div>

    </div>
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Contact</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="student : ${students}">

            <td th:text="${student.id}"></td>

            <td th:text="${student.name}"></td>

            <td th:text="${student.email}"></td>

            <td th:text="${student.course}"></td>

            <td th:text="${student.contact}"></td>



            <td>

                <a th:href="@{/students/edit/{id}(id=${student.id})}"
                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a th:href="@{/students/delete/{id}(id=${student.id})}"
                   class="btn btn-danger btn-sm">

                    Delete

                </a>

            </td>


        </tr>

        </tbody>

    </table>

</div>
