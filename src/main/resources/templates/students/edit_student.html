<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student | Library Management System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/formCss.css}">
</head>

<body>

<div th:replace="~{fragments/formHeader :: formHeader}"></div>

<div class="container">

    <div class="page-title">

        <div class="book-icon">📚</div>

        <h2>Edit Student</h2>

        <p class="text-muted">
            Enter Student information below
        </p>

    </div>
    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="form-card">



                <form th:action="@{/students/save_edit/{id}(id=${student.id})}"
                      th:object="${student}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               >
                        <p class="text-danger"
                           th:if="${#fields.hasErrors('name')}"
                           th:errors="*{name}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               >
                        <p class="text-danger"
                           th:if="${#fields.hasErrors('email')}"
                           th:errors="*{email}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="number"
                               th:field="*{contact}"
                               class="form-control"
                               >
                        <p class="text-danger"
                           th:if="${#fields.hasErrors('contact')}"
                           th:errors="*{contact}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course</label>
                        <input type="text"
                               th:field="*{course}"
                               class="form-control"
                               >
                        <p class="text-danger"
                           th:if="${#fields.hasErrors('course')}"
                           th:errors="*{course}"></p>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        💾 Update Student
                    </button>

                    <a th:href="@{/students}"
                       class="btn btn-secondary btn-back">
                        ← Back to Students
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>
<!--Footer-->
<div th:replace="~{fragments/footer :: footer}"></div>
<!--Footer-->
</body>
</html>
