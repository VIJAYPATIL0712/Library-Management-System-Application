<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/indexPage.css}">
    <link rel="stylesheet" th:href="@{/css/tableCss.css}">
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">

    <div class="page-title text-center">
        <h2>⌛ Overdue Books</h2>
        <p class="text-muted mb-1">
            View all overdue books
        </p>
    </div>

    <!-- Search -->
    <div class="search-section mt-2">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <form th:action="@{/overdue/search}"
                  method="get"
                  class="d-flex">

                <input type="text"
                       name="keyword"
                       class="form-control me-2"
                       placeholder="Search Student Name">

                <button type="submit"
                        class="btn btn-secondary">
                    Search
                </button>

            </form>

        </div>

    </div>

    <!-- Table -->
    <div class="container-fluid px-2">
        <div class="table-responsive">

            <table class="table table-hover table-bordered align-middle mt-2">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Book</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Late By</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(overdueBooks)}">
                    <td colspan="7" class="text-center text-muted">
                        No overdue books found.
                    </td>
                </tr>

                <tr th:each="overdueBook : ${overdueBooks}">

                    <td data-label="ID"
                        th:text="${overdueBook.id}">
                    </td>

                    <td data-label="Student"
                        th:text="${overdueBook.studentName}">
                    </td>

                    <td data-label="Book"
                        th:text="${overdueBook.bookTitle}">
                    </td>

                    <td data-label="Issue Date"
                        th:text="${overdueBook.issueDate}">
                    </td>

                    <td data-label="Due Date"
                        th:text="${overdueBook.dueDate}">
                    </td>

                    <td data-label="Status">
                        <span class="badge bg-danger"
                              th:text="Overdue">
                        </span>
                    </td>

                    <td data-label="Late By"
                        th:text="${overdueBook.overdueDays + ' Days'}">
                    </td>
                    <td data-label="Actions">

                        <a th:href="@{/issues/return/{id}(id=${overdueBook.id})}"
                           class="btn btn-success btn-sm me-1 mb-1">
                            Return
                        </a>

                        <a th:href="@{/issues/lost/{id}(id=${overdueBook.id})}"
                           class="btn btn-danger btn-sm me-1 mb-1">
                            Lost
                        </a>

                        <a th:href="@{/issues/damaged/{id}(id=${overdueBook.id})}"
                           class="btn btn-warning btn-sm mb-1">
                            Damaged
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
