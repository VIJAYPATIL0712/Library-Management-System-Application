<div th:fragment="header" xmlns:th="http://www.w3.org/1999/xhtml">

  <!-- HERO SECTION (Desktop stays SAME) -->
  <div class="hero-section">


    <h1>📚 Library Management System</h1>

    <p>
      Manage Books, Students, Issue & Return Operations Efficiently
    </p>

    <!-- DESKTOP BUTTONS -->
    <div class="nav-buttons desktop-menu">

      <a th:href="@{/}">
        <button class="menu-btn home-btn">🏠 Home</button>
      </a>

      <a th:href="@{/books}">
        <button class="menu-btn books-btn">📖 Books</button>
      </a>

      <a th:href="@{/students}">
        <button class="menu-btn students-btn">🎓 Students</button>
      </a>

      <a th:href="@{/issues}">
        <button class="menu-btn issues-btn">📤 Issues</button>
      </a>

      <a th:href="@{/returns}">
        <button class="menu-btn returns-btn" style="background:orange">📥 Returns</button>
      </a>

      <a th:href="@{/overdue}">
        <button class="menu-btn overdue-btn" style="background:red">⌛  Overdue </button>
      </a>

      <a th:href="@{/login}">
        <button class="menu-btn overdue-btn" style="background:red">  👤 Login </button>
      </a>

    </div>

    <!-- MOBILE DROPDOWN BUTTON -->
    <!-- MOBILE MENU BUTTON -->
    <!-- TOP BAR -->
    <div class="top-bar">

      <!-- LEFT: MENU -->
      <div class="left">
        <button class="icon-btn menu-icon" onclick="openMenu()">☰</button>
      </div>

      <!-- RIGHT: PROFILE -->
      <!-- RIGHT: PROFILE -->
      <div class="right">

        <div class="profile-wrapper">

          <div class="icon-btn profile-icon" onclick="toggleProfile()">
            👤
          </div>

          <!-- DROPDOWN -->
          <div id="profileDropdown" class="profile-dropdown">

            <a th:href="@{/login}">🔐 Login</a>

            <!-- optional later -->
            <a th:href="@{/logout}">🚪 Logout</a>

          </div>

        </div>

      </div>

    </div>
    <!-- OVERLAY -->
    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <!-- SIDE DRAWER -->
    <div id="sideMenu" class="side-menu">

      <h3>📚 Menu</h3>

      <a th:href="@{/}">🏠 Home</a>
      <a th:href="@{/books}">📖 Books</a>
      <a th:href="@{/students}">🎓 Students</a>
      <a th:href="@{/issues}">📤 Issues</a>
      <a th:href="@{/returns}">📥 Returns</a>
      <a th:href="@{/overdue}">⌛ Overdue </a>

    </div>

  </div>

</div>
